name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.24", "1.25"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: false

      # Prevent go.work from pulling a newer toolchain than what the matrix
      # version provides. GOTOOLCHAIN=local means "use only the installed Go".
      - name: Pin toolchain to installed Go
        run: go env -w GOTOOLCHAIN=local

      # -- Core module --------------------------------------------------------
      - name: Test core module
        run: go test -v -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      # -- Extension modules (each has its own go.mod) ------------------------
      - name: Test extension modules
        run: |
          set -e
          # Collect all ext module directories that contain a go.mod
          find ext -name "go.mod" | while read modfile; do
            dir=$(dirname "$modfile")
            echo ""
            echo "=== Testing $dir ==="
            (cd "$dir" && go test -v -race -count=1 ./...)
          done

      - name: Upload coverage
        if: matrix.go-version == '1.24'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Pin toolchain
        run: go env -w GOTOOLCHAIN=local

      - name: Download modules (core)
        env:
          GOWORK: "off"
        run: go mod download

      - name: golangci-lint (core)
        uses: golangci/golangci-lint-action@v6
        env:
          GOWORK: "off"
        with:
          version: latest
          args: --timeout=5m ./...

      - name: golangci-lint (extensions)
        env:
          GOWORK: "off"
        run: |
          find ext -name "go.mod" | while read modfile; do
            dir=$(dirname "$modfile")
            echo "=== Linting $dir ==="
            (cd "$dir" && golangci-lint run --timeout=3m ./...) || true
          done

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Pin toolchain
        run: go env -w GOTOOLCHAIN=local

      - name: go vet (core)
        run: go vet ./...

      - name: go vet (extensions)
        run: |
          set -e
          find ext -name "go.mod" | while read modfile; do
            dir=$(dirname "$modfile")
            echo "=== Vet $dir ==="
            (cd "$dir" && go vet ./...)
          done

  build-examples:
    name: Build Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Pin toolchain
        run: go env -w GOTOOLCHAIN=local

      - name: Build examples module
        env:
          GOWORK: "off"
        run: cd examples && go build ./...
