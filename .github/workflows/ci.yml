name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.24", "1.25"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: false

      # Prevent go.work from pulling a newer toolchain than what the matrix
      # version provides. GOTOOLCHAIN=local means "use only the installed Go".
      - name: Pin toolchain to installed Go
        run: go env -w GOTOOLCHAIN=local

      # -- Core module --------------------------------------------------------
      - name: Test core module
        run: go test -v -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      # -- Extension modules (each has its own go.mod) ------------------------
      - name: Test extension modules
        run: |
          set -e
          find ext -name "go.mod" | while read modfile; do
            dir=$(dirname "$modfile")
            echo ""
            echo "=== Testing $dir ==="
            (cd "$dir" && go test -v -race -count=1 ./...)
          done

      - name: Upload coverage artifact
        if: matrix.go-version == '1.24'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage.out
          retention-days: 1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.24"
          cache: false

      - name: Pin toolchain
        run: go env -w GOTOOLCHAIN=local

      - name: Download modules (core)
        env:
          GOWORK: "off"
        run: go mod download

      - name: golangci-lint (core)
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v6
        env:
          GOWORK: "off"
        with:
          version: latest
          args: --timeout=5m ./...

      - name: golangci-lint (extensions)
        env:
          GOWORK: "off"
        run: |
          find ext -name "go.mod" | while read modfile; do
            dir=$(dirname "$modfile")
            echo "=== Linting $dir ==="
            (cd "$dir" && golangci-lint run --timeout=3m ./...) || true
          done

  vet:
    name: Vet
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.24"
          cache: false

      - name: Pin toolchain
        run: go env -w GOTOOLCHAIN=local

      - name: go vet (core)
        run: go vet ./...

      - name: go vet (extensions)
        run: |
          set -e
          find ext -name "go.mod" | while read modfile; do
            dir=$(dirname "$modfile")
            echo "=== Vet $dir ==="
            (cd "$dir" && go vet ./...)
          done

  build-examples:
    name: Build Examples
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.24"
          cache: false

      - name: Pin toolchain
        run: go env -w GOTOOLCHAIN=local

      - name: Build examples module
        env:
          GOWORK: "off"
        run: cd examples && go build ./...

  # ── Auto Tag ────────────────────────────────────────────────────────────────
  # Runs only on direct pushes to master, only after ALL checks above pass.
  # - Detects which Go modules were changed in the commit.
  # - Computes the next semver from the highest existing tag for each module.
  # - Bump type follows Conventional Commits:
  #     BREAKING CHANGE / type! -> major
  #     feat                    -> minor
  #     everything else         -> patch
  # - Creates lightweight tags and pushes them.
  # - Notifies pkg.go.dev so the new version is indexed immediately.
  auto-tag:
    name: Auto Tag
    needs: [test, lint, vet, build-examples]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0   # need full history to list all existing tags

      - name: Tag changed modules and notify pkg.go.dev
        run: |
          set -euo pipefail

          # ── 1. Determine bump type from Conventional Commits ───────────────
          SUBJECT=$(git log -1 --format="%s")
          BODY=$(git log -1 --format="%b")

          if printf '%s\n%s' "$SUBJECT" "$BODY" | grep -qE 'BREAKING[[:space:]]CHANGE' \
          || printf '%s' "$SUBJECT" | grep -qE '^[a-z]+(\([^)]*\))?!:'; then
            BUMP=major
          elif printf '%s' "$SUBJECT" | grep -qE '^feat(\([^)]*\))?:'; then
            BUMP=minor
          else
            BUMP=patch
          fi
          echo "Bump type: $BUMP  (commit: $SUBJECT)"

          # ── 2. Skip if HEAD is already tagged ─────────────────────────────
          if git tag --points-at HEAD | grep -q .; then
            echo "HEAD already tagged: $(git tag --points-at HEAD | tr '\n' ' ') - skipping"
            exit 0
          fi

          # ── 3. Detect which Go modules were touched ────────────────────────
          # Walk each changed file upward until we find a go.mod directory.
          # Use whitelist approach: only consider changes to .go, go.mod, go.sum, README
          declare -A AFFECTED

          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            mapfile -t CHANGED < <(git diff --name-only HEAD~1 HEAD)
          else
            mapfile -t CHANGED < <(git diff-tree --no-commit-id -r --name-only HEAD)
          fi

          echo "Changed files: ${CHANGED[*]}"

          # Filter to only code and dependency files that matter
          for f in "${CHANGED[@]}"; do
            # Only process Go source, module files, and key documentation
            case "$f" in
              # Code and dependency files - these trigger tags
              *.go|go.mod|go.sum|README.md)
                # These are taggable changes
                ;;
              # Everything else is ignored - no tag needed
              *)
                continue
                ;;
            esac

            d=$(dirname "$f")
            while true; do
              if [[ "$d" == "." ]]; then
                AFFECTED["."]=1   # core module
                break
              fi
              if [[ -f "$d/go.mod" ]]; then
                AFFECTED["$d"]=1  # ext module
                break
              fi
              d=$(dirname "$d")
            done
          done

          if [[ ${#AFFECTED[@]} -eq 0 ]]; then
            echo "No Go code or dependency changes detected - nothing to tag"
            echo "Only tags are created for: Go source (*.go), dependencies (go.mod/go.sum), or README updates"
            exit 0
          fi
          echo "Affected modules: ${!AFFECTED[*]}"

          # ── 4. Helper: bump a semver string ────────────────────────────────
          bump_semver() {
            local v="$1" bump="$2"
            local major minor patch
            IFS='.' read -r major minor patch <<< "$v"
            case "$bump" in
              major) ((major++)); minor=0; patch=0 ;;
              minor) ((minor++)); patch=0 ;;
              patch) ((patch++)) ;;
            esac
            echo "${major}.${minor}.${patch}"
          }

          # ── 5. Compute and create tags ─────────────────────────────────────
          TAGS_CREATED=()

          for mod_dir in "${!AFFECTED[@]}"; do
            if [[ "$mod_dir" == "." ]]; then
              # Core: tag pattern is v0.1.2 (no path prefix)
              latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
                         | grep -v '/' | sed 's/^v//' | sort -V | tail -1)
              tag_prefix="v"
            else
              # Ext: tag pattern is ext/tracing/v0.2.1
              latest=$(git tag -l "${mod_dir}/v[0-9]*.[0-9]*.[0-9]*" \
                         | sed "s|^${mod_dir}/v||" | sort -V | tail -1)
              tag_prefix="${mod_dir}/v"
            fi

            if [[ -z "$latest" ]]; then
              next="0.1.0"
            else
              next=$(bump_semver "$latest" "$BUMP")
            fi

            new_tag="${tag_prefix}${next}"

            if git tag -l "$new_tag" | grep -q .; then
              echo "Tag $new_tag already exists - skipping"
              continue
            fi

            echo "Creating tag: $new_tag  (was: ${latest:-none})"
            git tag "$new_tag"
            TAGS_CREATED+=("$new_tag")
          done

          if [[ ${#TAGS_CREATED[@]} -eq 0 ]]; then
            echo "No new tags created"
            exit 0
          fi

          # ── 6. Push tags ───────────────────────────────────────────────────
          git push origin "${TAGS_CREATED[@]}"
          echo "Pushed: ${TAGS_CREATED[*]}"

          # ── 7. Notify pkg.go.dev ───────────────────────────────────────────
          for tag in "${TAGS_CREATED[@]}"; do
            if [[ "$tag" != */* ]]; then
              # Core: v0.1.2 -> github.com/jhonsferg/relay@v0.1.2
              fetch_url="https://pkg.go.dev/fetch/github.com/jhonsferg/relay@${tag}"
            else
              # Ext: ext/tracing/v0.2.1 -> github.com/jhonsferg/relay/ext/tracing@v0.2.1
              ver="${tag##*/}"           # v0.2.1
              mod_path="${tag%/v*}"      # ext/tracing
              fetch_url="https://pkg.go.dev/fetch/github.com/jhonsferg/relay/${mod_path}@${ver}"
            fi

            echo "Notifying pkg.go.dev: $fetch_url"
            http_code=$(curl -sf -o /dev/null -w "%{http_code}" \
              -X POST -H "Content-Length: 0" "$fetch_url" || true)
            echo "  Response: $http_code"
          done

  # ── Update Badges ───────────────────────────────────────────────────────────
  # Runs after tests pass on master. Downloads the coverage artifact from the
  # test job, builds a shields.io endpoint JSON, and pushes it to the `badges`
  # orphan branch so the README badge always shows the latest number.
  badges:
    name: Update Badges
    needs: [test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.24"
          cache: false

      - name: Pin toolchain
        run: go env -w GOTOOLCHAIN=local

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage

      - name: Compute coverage percentage and color
        id: cov
        run: |
          PCT=$(go tool cover -func=coverage.out | grep '^total' | awk '{print $3}' | tr -d '%')
          INT=${PCT%.*}
          if   [ "$INT" -ge 80 ]; then COLOR=brightgreen
          elif [ "$INT" -ge 70 ]; then COLOR=green
          elif [ "$INT" -ge 60 ]; then COLOR=yellow
          elif [ "$INT" -ge 50 ]; then COLOR=orange
          else                         COLOR=red
          fi
          echo "pct=$PCT"   >> "$GITHUB_OUTPUT"
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${PCT}% -> $COLOR"

      - name: Push coverage.json to badges branch
        run: |
          PCT="${{ steps.cov.outputs.pct }}"
          COLOR="${{ steps.cov.outputs.color }}"

          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' \
            "$PCT" "$COLOR" > /tmp/coverage.json

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin badges 2>/dev/null || true

          if git ls-remote --exit-code --heads origin badges > /dev/null 2>&1; then
            git checkout -B badges origin/badges
          else
            git checkout --orphan badges
            git rm -rf . --quiet 2>/dev/null || true
          fi

          cp /tmp/coverage.json coverage.json
          git add coverage.json

          if git diff --cached --quiet; then
            echo "Badge unchanged - skipping push"
            exit 0
          fi

          git commit -m "chore: update coverage [skip ci]"
          git push origin badges
