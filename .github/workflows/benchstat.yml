name: Benchmark Regression

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  bench-regression:
    name: Benchmark Regression Detection
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v5
        with:
          go-version: "1.24"
          cache: false

      - name: Pin toolchain to installed Go
        run: go env -w GOTOOLCHAIN=local

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks on PR branch
        run: |
          go test -bench=. -benchmem -run=^$ -count=6 ./benchmarks/... 2>&1 | tee pr.txt

      - name: Checkout master branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          ref: master
          clean: false

      - name: Run benchmarks on master branch
        run: |
          go test -bench=. -benchmem -run=^$ -count=6 ./benchmarks/... 2>&1 | tee master.txt

      - name: Compare benchmarks with benchstat
        id: benchstat
        run: |
          BENCHSTAT_OUTPUT=$(benchstat master.txt pr.txt 2>&1)
          echo "$BENCHSTAT_OUTPUT"

          # Save the full output for the PR comment
          {
            echo 'BENCHSTAT_RESULT<<EOF'
            echo "$BENCHSTAT_OUTPUT"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          # Detect regressions: look for lines where the change is worse by >10%
          # benchstat marks statistically significant regressions with a '~' or a '+'
          # A regression shows as a positive percentage for time/allocs/bytes
          THRESHOLD="${BENCH_REGRESSION_THRESHOLD:-10}"

          REGRESSIONS=$(echo "$BENCHSTAT_OUTPUT" | awk -v threshold="$THRESHOLD" '
            /^goos|^goarch|^pkg|^cpu|^$|^name/ { next }
            {
              # Find percentage in the delta column (last field if it looks like +N.Nx or -N.Nx)
              for (i = 1; i <= NF; i++) {
                if ($i ~ /^\+[0-9]+\.[0-9]+%$/) {
                  # Extract numeric value
                  val = $i
                  gsub(/[+%]/, "", val)
                  if (val + 0 > threshold + 0) {
                    print "REGRESSION:", $0
                  }
                }
              }
            }
          ')

          if [ -n "$REGRESSIONS" ]; then
            echo ""
            echo "::error::Benchmark regressions detected (>${THRESHOLD}%):"
            echo "$REGRESSIONS"
            echo 'HAS_REGRESSIONS=true' >> "$GITHUB_OUTPUT"
          else
            echo 'HAS_REGRESSIONS=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Post benchstat results as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const benchstatResult = process.env.BENCHSTAT_RESULT || '(no output)';
            const hasRegressions = process.env.HAS_REGRESSIONS === 'true';

            const header = hasRegressions
              ? '## ⚠️ Benchmark Regression Detected'
              : '## ✅ Benchmark Results (No Regression)';

            const threshold = process.env.BENCH_REGRESSION_THRESHOLD || '10';
            const body = [
              header,
              '',
              `Threshold: >${threshold}% regression fails CI.`,
              '',
              '```',
              benchstatResult,
              '```',
              '',
              '_Generated by [benchstat](https://pkg.go.dev/golang.org/x/perf/cmd/benchstat) — comparing master vs PR branch (count=6)._',
            ].join('\n');

            // Find and update existing comment, or create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(
              c => c.user.login === 'github-actions[bot]' && c.body.includes('Benchmark')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        env:
          BENCHSTAT_RESULT: ${{ steps.benchstat.outputs.BENCHSTAT_RESULT }}
          HAS_REGRESSIONS: ${{ steps.benchstat.outputs.HAS_REGRESSIONS }}
          BENCH_REGRESSION_THRESHOLD: "10"

      - name: Fail if regressions detected
        if: steps.benchstat.outputs.HAS_REGRESSIONS == 'true'
        run: |
          echo "::error::One or more benchmarks regressed by more than ${BENCH_REGRESSION_THRESHOLD:-10}%. See the benchstat output above."
          exit 1
