version: 2
updates:
  # GitHub Actions - keep pinned SHAs up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"

  # Core module
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"

  # Extension modules
  - package-ecosystem: "gomod"
    directory: "/ext/breaker/gobreaker"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/brotli"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/cache/lru"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/cache/twolevel"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/grpc"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/jitterbug"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/logrus"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/memcached"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/metrics"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/mock"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/oauth"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/openapi"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/prometheus"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/ratelimit/distributed"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/redis"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/sentry"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/sigv4"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/tracing"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/zap"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/ext/zerolog"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/examples"
    schedule:
      interval: "weekly"
