# Grouped security updates
groups:
  security-updates:
    patterns:
      - "security*"
    update-types:
      - "version-update:semver-major"
      - "version-update:semver-minor"
    schedule:
      interval: "daily"

  dependency-updates:
    patterns:
      - "*"
    update-types:
      - "version-update:semver-patch"
    schedule:
      interval: "weekly"
