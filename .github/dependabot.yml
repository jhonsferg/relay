version: 2

updates:
  # Go Dependencies - Core module
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "02:00"
    reviewers:
      - "jhonsferg"
    labels:
      - "dependencies"
      - "go"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "03:00"
    reviewers:
      - "jhonsferg"
    labels:
      - "ci"
      - "github-actions"

  # Extension modules - gobreaker
  - package-ecosystem: "gomod"
    directory: "/ext/breaker/gobreaker"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ext"

