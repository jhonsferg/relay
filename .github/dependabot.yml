version: 2

updates:
  # Go Dependencies - Core module
  # Only allow minor and patch updates to avoid breaking changes
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "02:00"
    reviewers:
      - "jhonsferg"
    labels:
      - "dependencies"
      - "go"
    # Restrict to minor and patch updates only (no major version bumps)
    # This ensures compatibility with Go 1.24.0+
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    # Limit to 5 open PRs to avoid overwhelming maintenance
    open-pull-requests-limit: 5

  # GitHub Actions
  # Reduce frequency and limit to manual review (major versions need testing)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"  # Reduced from weekly to monthly
      day: "sunday"
      time: "03:00"
    reviewers:
      - "jhonsferg"
    labels:
      - "ci"
      - "github-actions"
    # Limit to 2 open PRs for GitHub Actions (need careful review)
    open-pull-requests-limit: 2

  # Extension modules - gobreaker
  - package-ecosystem: "gomod"
    directory: "/ext/breaker/gobreaker"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ext"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    open-pull-requests-limit: 5

